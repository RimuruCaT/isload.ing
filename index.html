<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Animations Performance Art</title>
    <style>
        body {
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
            background-color: black;
            color: cyan;
            overflow: hidden;
        }

        .animation-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 80%;
            max-width: 1200px;
        }

        /* Infinite Progress Bar Animation */
        .progress-bar {
            width: 100%;
            height: 20px;
            background: linear-gradient(90deg, cyan, pink);
            position: relative;
            overflow: hidden;
            animation: loading 2s linear infinite;
        }
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Spinning Circles */
        .circle {
            border: 10px solid transparent;
            border-top: 10px solid cyan;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .circle.slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pulsing Dots */
        .pulsing-dot {
            width: 20px;
            height: 20px;
            background-color: cyan;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        /* Bouncing Ball with Glow */
        .bouncing-ball {
            width: 30px;
            height: 30px;
            background-color: pink;
            border-radius: 50%;
            box-shadow: 0 0 20px pink;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-50px); }
        }

        /* Wave Animation Bars */
        .wave {
            width: 10px;
            height: 100px;
            background-color: cyan;
            animation: wave 1s infinite alternate;
        }
        @keyframes wave {
            0% { height: 100px; }
            100% { height: 200px; }
        }

        /* Orbiting Particles */
        .orbit {
            width: 10px;
            height: 10px;
            background-color: cyan;
            border-radius: 50%;
            position: absolute;
            animation: orbit 5s linear infinite;
        }
        @keyframes orbit {
            0% { transform: translate(50px, 0); }
            25% { transform: translate(0, 50px); }
            50% { transform: translate(-50px, 0); }
            75% { transform: translate(0, -50px); }
            100% { transform: translate(50px, 0); }
        }

        /* Rotating Gradient Ring */
        .gradient-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(cyan, pink);
            animation: rotate 3s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Flashing Bars */
        .flashing-bar {
            width: 20px;
            height: 100px;
            background-color: cyan;
            animation: flash 1s infinite;
        }
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Double Rotating Rings */
        .double-ring {
            position: relative;
            width: 60px;
            height: 60px;
            margin: auto;
        }
        .outer-ring, .inner-ring {
            border: 5px solid transparent;
            border-radius: 50%;
            position: absolute;
            animation: rotate 4s linear infinite;
        }
        .outer-ring {
            border-top-color: cyan;
            width: 100%;
            height: 100%;
        }
        .inner-ring {
            width: 70%;
            height: 70%;
            left: 15%;
            top: 15%;
            animation: rotate 2s linear infinite;
            border-top-color: pink;
        }
    </style>
</head>
<body>
    <div class="animation-container">
        <div class="progress-bar"></div>
        <div class="circle"></div>
        <div class="circle slow"></div>
        <div class="pulsing-dot"></div>
        <div class="bouncing-ball"></div>
        <div class="wave"></div>
        <div class="orbit"></div>
        <div class="gradient-ring"></div>
        <div class="flashing-bar"></div>
        <div class="double-ring">
            <div class="outer-ring"></div>
            <div class="inner-ring"></div>
        </div>
    </div>
</body>
</html>
